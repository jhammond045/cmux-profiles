name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zip the Spoon
        run: zip -r CmuxPick.spoon.zip CmuxPick.spoon
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: CmuxPick.spoon.zip
          generate_release_notes: true
